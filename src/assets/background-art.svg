<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Urban Sneakers background art</title>
  <desc id="desc">Abstract geometric waves pattern in subtle blues for a store background</desc>
  <defs>
    <linearGradient id="g1" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0b2a46" stop-opacity="0.45" />
      <stop offset="100%" stop-color="#082033" stop-opacity="0.35" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#183a5a" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0b2540" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="40" result="b"/>
      <feBlend in="SourceGraphic" in2="b" mode="screen"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#g1)" />
  <g filter="url(#soft)" opacity="0.45">
    <path d="M0 600 C300 450 600 450 900 600 C1200 750 1500 750 1920 600 L1920 1080 L0 1080 Z" fill="#0b3a5a" opacity="0.18" />
    <path d="M0 480 C360 340 720 340 1080 480 C1440 620 1680 620 1920 480 L1920 1080 L0 1080 Z" fill="#0b3a5a" opacity="0.12" />
    <circle cx="1600" cy="180" r="220" fill="url(#g2)" opacity="0.08" />
    <circle cx="280" cy="220" r="140" fill="#0b6a9a" opacity="0.06" />
  </g>
  <g opacity="0.06">
    <rect x="60" y="60" width="1800" height="120" rx="12" fill="#ffffff" transform="rotate(-6 960 120)" />
    <rect x="-80" y="940" width="2000" height="60" rx="12" fill="#ffffff" transform="rotate(-2 960 970)" />
  </g>
</svg>